<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f6f5b" />
    <title>健身追踪</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=65" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker" id="todayLabel"></p>
          <h1>健身追踪</h1>
        </div>
        <div class="top-actions">
          <button class="sync-pill avatar-button" id="authButton" type="button">登录</button>
          <span class="sync-status local" id="syncStatus" aria-live="polite">本地模式</span>
          <button class="icon-button" id="backupButton" type="button" aria-label="备份">
            <span aria-hidden="true">↧</span>
          </button>
        </div>
      </header>

      <main>
        <section class="view active" id="view-home" aria-labelledby="homeTitle">
          <h2 id="homeTitle">今日</h2>
          <div class="quick-grid">
            <button class="quick-action" data-open="workoutDialog" type="button">
              <span>+</span>
              记录训练
            </button>
            <button class="quick-action" data-open="bodyDialog" type="button">
              <span>+</span>
              身体数据
            </button>
            <button class="quick-action" data-open="photoDialog" type="button">
              <span>+</span>
              上传照片
            </button>
            <button class="quick-action" data-open="sleepDialog" type="button">
              <span>+</span>
              状态记录
            </button>
          </div>

          <div class="stats-grid">
            <article class="metric">
              <span class="metric-title"><span>体重</span><span id="weightMetricDate"></span></span>
              <strong id="latestWeight">--</strong>
              <small id="weightDelta">暂无变化</small>
            </article>
            <article class="metric">
              <span class="metric-title"><span>腰围</span><span id="waistMetricDate"></span></span>
              <strong id="latestWaist">--</strong>
              <small id="waistDelta">暂无变化</small>
            </article>
            <article class="metric">
              <span class="metric-title"><span>状态</span><span id="stateMetricDate"></span></span>
              <strong id="latestAfternoonState">--</strong>
              <small id="sleepImpactNote" class="metric-placeholder">暂无记录</small>
            </article>
          </div>

          <section class="panel">
            <div class="section-title">
              <h3>最近训练</h3>
              <button class="text-button" data-nav="workouts" type="button">查看</button>
            </div>
            <div id="recentWorkout" class="empty-state">还没有训练记录</div>
          </section>

          <section class="panel">
            <div class="section-title">
              <h3 id="homeTrendTitle">30天趋势 - 体重/腰围</h3>
            </div>
            <div class="range-tabs compact-tabs" role="tablist" aria-label="首页图表范围" data-chart-range="home">
              <button class="active" data-range="30" type="button">30天</button>
              <button data-range="90" type="button">3个月</button>
              <button data-range="180" type="button">半年</button>
              <button data-range="365" type="button">1年</button>
              <button data-range="1825" type="button">5年</button>
              <button data-range="all" type="button">All time</button>
            </div>
            <canvas id="homeChart" height="260"></canvas>
          </section>
        </section>

        <section class="view" id="view-workouts" aria-labelledby="workoutsTitle">
          <div class="section-title sticky-title">
            <h2 id="workoutsTitle">训练</h2>
            <button class="primary-button" data-open="workoutDialog" type="button">新增</button>
          </div>
          <label class="search-field">
            <input id="workoutSearch" type="search" placeholder="搜索训练、动作、备注" autocomplete="off" />
          </label>
          <section class="panel template-panel">
            <div class="section-title compact">
              <h3>模板</h3>
              <span class="timeline-meta" id="templateCount">0 个模板</span>
            </div>
            <div id="templateList" class="template-list"></div>
          </section>
          <section class="panel history-panel">
            <div class="section-title compact">
              <h3>动作历史</h3>
              <div class="section-actions">
                <span class="timeline-meta" id="exerciseHistoryCount">0 个动作</span>
                <button class="text-button" id="manageExercisesButton" type="button">管理</button>
              </div>
            </div>
            <div id="exerciseHistoryList" class="exercise-history-list"></div>
          </section>
          <div id="workoutList" class="timeline"></div>
        </section>

        <section class="view" id="view-body" aria-labelledby="bodyTitle">
          <div class="section-title sticky-title">
            <h2 id="bodyTitle">身体</h2>
            <button class="primary-button" data-open="bodyDialog" type="button">新增</button>
          </div>
          <div class="range-tabs" role="tablist" aria-label="身体图表范围" data-chart-range="body">
            <button class="active" data-range="30" type="button">30天</button>
            <button data-range="90" type="button">3个月</button>
            <button data-range="180" type="button">半年</button>
            <button data-range="365" type="button">1年</button>
            <button data-range="1825" type="button">5年</button>
            <button data-range="all" type="button">All time</button>
          </div>
          <section class="panel chart-panel">
            <canvas id="bodyChart" height="260"></canvas>
          </section>
          <div id="bodyList" class="timeline"></div>
        </section>

        <section class="view" id="view-photos" aria-labelledby="photosTitle">
          <div class="section-title sticky-title">
            <h2 id="photosTitle">照片</h2>
            <button class="primary-button" data-open="photoDialog" type="button">上传</button>
          </div>
          <div id="photoGrid" class="photo-grid"></div>
        </section>

        <section class="view" id="view-sleep" aria-labelledby="sleepTitle">
          <div class="section-title sticky-title">
            <h2 id="sleepTitle">状态</h2>
            <button class="primary-button" data-open="sleepDialog" type="button">新增</button>
          </div>
          <div id="sleepList" class="timeline"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="active" data-nav="home" type="button">首页</button>
        <button data-nav="workouts" type="button">训练</button>
        <button data-nav="body" type="button">身体</button>
        <button data-nav="photos" type="button">照片</button>
        <button data-nav="sleep" type="button">状态</button>
      </nav>
    </div>

    <dialog id="workoutDialog">
      <form method="dialog" class="dialog-card" id="workoutForm">
        <div class="dialog-head">
          <h2 id="workoutDialogTitle">记录训练</h2>
          <button class="icon-button" value="cancel" type="button" data-close="workoutDialog" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="workoutId" />
        <label>日期<input id="workoutDate" type="date" required /></label>
        <label>标题<input id="workoutTitle" type="text" placeholder="例如 胸肩三头" required /></label>
        <div class="field-row">
          <label>时长 分钟<input id="workoutDuration" type="number" min="0" inputmode="decimal" /></label>
          <label>强度 1-10<input id="workoutIntensity" type="number" min="1" max="10" inputmode="decimal" /></label>
        </div>
        <label>备注<textarea id="workoutNotes" rows="2"></textarea></label>
        <p class="record-meta hidden" id="workoutMeta"></p>
        <div class="template-tools">
          <select id="templateSelect" aria-label="训练模板"></select>
          <button class="secondary-button" id="useTemplateButton" type="button">使用模板</button>
          <button class="text-button" id="saveTemplateButton" type="button">保存为模板</button>
        </div>
        <div class="section-title compact">
          <h3>动作</h3>
          <button class="text-button" id="addExerciseButton" type="button">添加动作</button>
        </div>
        <div id="exerciseEditor" class="exercise-editor"></div>
        <div class="dialog-actions">
          <button class="danger-button hidden" id="deleteWorkoutButton" type="button">删除</button>
          <button class="secondary-button" type="button" data-close="workoutDialog">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="exerciseHistoryDialog">
      <div class="dialog-card">
        <div class="dialog-head">
          <h2 id="exerciseHistoryTitle">动作历史</h2>
          <button class="icon-button" value="cancel" type="button" data-close="exerciseHistoryDialog" aria-label="关闭">×</button>
        </div>
        <div class="history-stats" id="exerciseHistoryStats"></div>
        <div class="history-records" id="exerciseHistoryRecords"></div>
      </div>
    </dialog>

    <dialog id="templateDetailDialog">
      <div class="dialog-card">
        <div class="dialog-head">
          <h2 id="templateDetailTitle">模板详情</h2>
          <button class="icon-button" value="cancel" type="button" data-close="templateDetailDialog" aria-label="关闭">×</button>
        </div>
        <div class="history-records" id="templateDetailBody"></div>
        <div class="dialog-actions">
          <button class="danger-button" id="deleteTemplateDetailButton" type="button">删除</button>
          <button class="primary-button" id="useTemplateDetailButton" type="button">使用模板</button>
        </div>
      </div>
    </dialog>

    <dialog id="exerciseLibraryDialog">
      <div class="dialog-card">
        <div class="dialog-head">
          <h2>动作库管理</h2>
          <button class="icon-button" value="cancel" type="button" data-close="exerciseLibraryDialog" aria-label="关闭">×</button>
        </div>
        <div class="library-manager">
          <section>
            <div class="section-title compact">
              <h3>显示中</h3>
              <span class="timeline-meta" id="visibleExerciseCount">0 个动作</span>
            </div>
            <div class="library-list" id="visibleExerciseList"></div>
          </section>
          <section>
            <div class="section-title compact">
              <h3>已隐藏</h3>
              <span class="timeline-meta" id="hiddenExerciseCount">0 个动作</span>
            </div>
            <div class="library-list" id="hiddenExerciseList"></div>
          </section>
        </div>
      </div>
    </dialog>

    <dialog id="bodyDialog">
      <form method="dialog" class="dialog-card" id="bodyForm">
        <div class="dialog-head">
          <h2 id="bodyDialogTitle">身体数据</h2>
          <button class="icon-button" value="cancel" type="button" data-close="bodyDialog" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="bodyId" />
        <label>日期<input id="bodyDate" type="date" required /></label>
        <div class="field-row">
          <label>体重 kg<input id="bodyWeight" type="number" min="0" step="0.1" inputmode="decimal" /></label>
          <label>腰围 cm<input id="bodyWaist" type="number" min="0" step="0.1" inputmode="decimal" /></label>
        </div>
        <details>
          <summary>更多指标</summary>
          <div class="field-row">
            <label>胸围 cm<input id="bodyChest" type="number" min="0" step="0.1" inputmode="decimal" /></label>
            <label>臀围 cm<input id="bodyHips" type="number" min="0" step="0.1" inputmode="decimal" /></label>
          </div>
          <div class="field-row">
            <label>大腿围 cm<input id="bodyThigh" type="number" min="0" step="0.1" inputmode="decimal" /></label>
            <label>手臂围 cm<input id="bodyArm" type="number" min="0" step="0.1" inputmode="decimal" /></label>
          </div>
          <label>体脂率 %<input id="bodyFat" type="number" min="0" step="0.1" inputmode="decimal" /></label>
        </details>
        <label>备注<textarea id="bodyNotes" rows="2"></textarea></label>
        <p class="record-meta hidden" id="bodyMeta"></p>
        <div class="dialog-actions">
          <button class="danger-button hidden" id="deleteBodyButton" type="button">删除</button>
          <button class="secondary-button" type="button" data-close="bodyDialog">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="sleepDialog">
      <form method="dialog" class="dialog-card" id="sleepForm">
        <div class="dialog-head">
          <h2 id="sleepDialogTitle">状态记录</h2>
          <button class="icon-button" value="cancel" type="button" data-close="sleepDialog" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="sleepId" />
        <label>日期<input id="sleepDate" type="date" required /></label>
        <div class="field-row">
          <label>昨晚睡眠评分
            <select id="sleepScore">
              <option value="">未填写</option>
              <option value="1">1 很差</option>
              <option value="2">2 偏差</option>
              <option value="3">3 一般</option>
              <option value="4">4 不错</option>
              <option value="5">5 很好</option>
            </select>
          </label>
          <label>醒来感觉
            <select id="wakeFeeling">
              <option value="">未填写</option>
              <option value="tired">很累</option>
              <option value="okay">还行</option>
              <option value="clear">清醒</option>
            </select>
          </label>
        </div>
        <fieldset>
          <legend>昨晚睡眠问题</legend>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="sleepIssues" value="入睡困难" />入睡困难</label>
            <label><input type="checkbox" name="sleepIssues" value="早醒" />早醒</label>
            <label><input type="checkbox" name="sleepIssues" value="多梦" />多梦</label>
            <label><input type="checkbox" name="sleepIssues" value="夜醒" />夜醒</label>
            <label><input type="checkbox" name="sleepIssues" value="睡眠浅" />睡眠浅</label>
            <label><input type="checkbox" name="sleepIssues" value="打断多" />打断多</label>
          </div>
        </fieldset>
        <div class="field-row">
          <label>下午状态评分
            <select id="afternoonScore">
              <option value="">未填写</option>
              <option value="1">1 很难受</option>
              <option value="2">2 偏差</option>
              <option value="3">3 一般</option>
              <option value="4">4 还不错</option>
              <option value="5">5 很好</option>
            </select>
          </label>
          <label>严重程度
            <select id="severity">
              <option value="">未填写</option>
              <option value="mild">轻</option>
              <option value="medium">中</option>
              <option value="heavy">重</option>
            </select>
          </label>
        </div>
        <label>发生时间<input id="impactWindow" type="text" placeholder="例如 13:00-17:00" /></label>
        <fieldset>
          <legend>难受类型</legend>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="symptoms" value="困" />困</label>
            <label><input type="checkbox" name="symptoms" value="头昏" />头昏</label>
            <label><input type="checkbox" name="symptoms" value="注意力差" />注意力差</label>
            <label><input type="checkbox" name="symptoms" value="眼睛难受" />眼睛难受</label>
            <label><input type="checkbox" name="symptoms" value="身体疲劳" />身体疲劳</label>
            <label><input type="checkbox" name="symptoms" value="烦躁" />烦躁</label>
          </div>
        </fieldset>
        <fieldset>
          <legend>可能诱因</legend>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="factors" value="晚睡/睡的少" />晚睡/睡的少</label>
            <label><input type="checkbox" name="factors" value="晚餐晚/多" />晚餐晚/多</label>
            <label><input type="checkbox" name="factors" value="睡前屏幕" />睡前屏幕</label>
            <label><input type="checkbox" name="factors" value="压力" />压力</label>
            <label><input type="checkbox" name="factors" value="鼻塞" />鼻塞</label>
            <label><input type="checkbox" name="factors" value="温度不适" />温度不适</label>
          </div>
        </fieldset>
        <label>备注<textarea id="sleepNotes" rows="3" placeholder="比如下午什么时候开始难受、怎么缓解、是否影响训练或工作"></textarea></label>
        <p class="record-meta hidden" id="sleepMeta"></p>
        <div class="dialog-actions">
          <button class="danger-button hidden" id="deleteSleepButton" type="button">删除</button>
          <button class="secondary-button" type="button" data-close="sleepDialog">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="photoDialog">
      <form method="dialog" class="dialog-card" id="photoForm">
        <div class="dialog-head">
          <h2>上传照片</h2>
          <button class="icon-button" value="cancel" type="button" data-close="photoDialog" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="photoId" />
        <input type="hidden" id="photoCapturedAt" />
        <label>日期<input id="photoDate" type="date" required /></label>
        <label>照片<input id="photoFile" type="file" accept="image/*" /></label>
        <div id="photoPreview" class="photo-preview empty-state">选择照片后会显示预览</div>
        <div class="field-row">
          <label>角度
            <select id="photoAngle">
              <option value="front">正面</option>
              <option value="side">侧面</option>
              <option value="back">背面</option>
              <option value="other">其他</option>
            </select>
          </label>
          <label>体重 kg<input id="photoWeight" type="number" min="0" step="0.1" inputmode="decimal" /></label>
        </div>
        <label>备注<textarea id="photoNotes" rows="2"></textarea></label>
        <p class="record-meta hidden" id="photoMeta"></p>
        <div class="dialog-actions">
          <button class="danger-button hidden" id="deletePhotoButton" type="button">删除</button>
          <button class="secondary-button" type="button" data-close="photoDialog">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="backupDialog">
      <form method="dialog" class="dialog-card" id="backupForm">
        <div class="dialog-head">
          <h2>数据备份</h2>
          <button class="icon-button" value="cancel" type="button" data-close="backupDialog" aria-label="关闭">×</button>
        </div>
        <p class="muted">第一版数据保存在当前浏览器。建议定期导出备份，换手机前也先导出。</p>
        <button class="primary-button full" id="exportButton" type="button">导出备份</button>
        <label>导入备份<input id="importFile" type="file" accept="application/json" /></label>
        <button class="secondary-button full" id="importButton" type="button">导入</button>
        <button class="primary-button full hidden" id="uploadCloudButton" type="button">上传本地数据到云端</button>
        <button class="secondary-button full hidden" id="refreshCloudButton" type="button">从云端刷新</button>
      </form>
    </dialog>

    <dialog id="authDialog">
      <form method="dialog" class="dialog-card" id="authForm">
        <div class="dialog-head">
          <h2>账号</h2>
          <button class="icon-button" value="cancel" type="button" data-close="authDialog" aria-label="关闭">×</button>
        </div>
        <p class="muted" id="authStatus">登录后可把训练、身体数据和照片同步到云端。</p>
        <label>邮箱<input id="authEmail" type="email" autocomplete="email" /></label>
        <label>密码<input id="authPassword" type="password" autocomplete="current-password" /></label>
        <div class="dialog-actions">
          <button class="danger-button hidden" id="signOutButton" type="button">退出</button>
          <button class="secondary-button" id="signUpButton" type="button">注册</button>
          <button class="primary-button" id="signInButton" type="button">登录</button>
        </div>
      </form>
    </dialog>

    <dialog id="messageDialog">
      <form method="dialog" class="dialog-card message-card">
        <div class="dialog-head">
          <h2 id="messageTitle">提示</h2>
          <button class="icon-button" value="cancel" type="button" id="messageCloseButton" aria-label="关闭">×</button>
        </div>
        <p class="muted" id="messageBody"></p>
        <div class="dialog-actions">
          <button class="secondary-button hidden" id="messageCancelButton" type="button">取消</button>
          <button class="primary-button" id="messageConfirmButton" type="button">确定</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js?v=65"></script>
  </body>
</html>
